<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn Cao Cấp</title>
    
    <!-- ================================================================= -->
    <!-- 🎨 1. KHU VỰC CSS (Giao diện hiển thị trang web)                 -->
    <!-- ================================================================= -->
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2ed573;
            --dark-color: #2f3542;
            --light-color: #f1f2f6;
            --border-radius: 12px;
            --shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e272e 0%, #0f141c 100%);
            color: var(--light-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }

        .main-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: var(--border-radius);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
            margin-bottom: 25px;
            text-align: center;
        }

        .auth-box h3 { margin-bottom: 12px; color: #ffa502; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { opacity: 0.9; }

        .status-msg {
            margin-top: 8px;
            font-size: 13px;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        .wheel-container.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3));
        }

        #btnSpin {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            color: #111;
            font-size: 16px;
            font-weight: 800;
            border: 5px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .card-header {
            background: rgba(255, 255, 255, 0.08);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-body { padding: 15px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }
        .btn-danger { background: #ff6b81; }

        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .popup-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .popup-overlay.active { display: flex; }

        .popup-content {
            background: #fff;
            color: #111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .popup-content h2 { color: var(--primary-color); }
        .popup-content h1 { margin: 20px 0; font-size: 32px; color: #ffa502; }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
    
    <!-- Thư viện hiệu ứng pháo hoa Confetti bên thứ 3 -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- ================================================================= -->
    <!-- 🧱 2. KHU VỰC HTML (Khung xương nội dung)               -->
    <!-- ================================================================= -->
    <div class="container">
        <div class="main-section">
            <div class="auth-box" id="authBox">
                <h3>🔑 Nhập Thông Tin Tham Gia</h3>
                <input type="text" id="playerNameInput" placeholder="Nhập họ và tên...">
                <input type="text" id="inviteCodeInput" placeholder="Nhập mã quay thưởng...">
                <button id="btnVerifyCode">Xác nhận thông tin</button>
                <p class="status-msg" id="authStatus"></p>
            </div>
            
            <div class="wheel-container disabled" id="wheelContainer">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
                <button id="btnSpin" disabled>QUAY</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="card">
                <div class="card-header">
                    <h3>🏆 Lịch Sử Trúng Thưởng</h3>
                    <button id="btnResetAll" class="btn-sm btn-danger">🔄 Reset</button>
                </div>
                <div class="card-body">
                    <ul class="history-list" id="historyList"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup chúc mừng kết quả -->
    <div class="popup-overlay" id="popupWin">
        <div class="popup-content">
            <h2>🎉 CHÚC MỪNG BẠN!</h2>
            <p>Bạn đã trúng thưởng phần quà:</p>
            <h1 id="winRewardName">Phần quà</h1>
            <button id="btnClosePopup">Đóng thông báo</button>
        </div>
    </div>

    <!-- ================================================================= -->
    <!-- ⚙️ 3. KHU VỰC JAVASCRIPT (Xử lý toàn bộ logic hệ thống)           -->
    <!-- ================================================================= -->
    <script>
        // --- CẤU HÌNH TRƯỚC TRONG CODE (BẠN ĐIỀU CHỈNH TẠI ĐÂY) ---
        const HARDCODED_REWARDS = [
            "iPhone 15 Pro Max", 
            "Thẻ Cào 500.000đ", 
            "Voucher Giảm 50%", 
            "Tai Nghe Bluetooth", 
            "Chúc Bạn May Mắn", 
            "Bình Nước Giữ Nhiệt", 
            "Sạc Dự Phòng 20W", 
            "Mũ Bảo Hiểm Cao Cấp"
        ];

        const INITIAL_ONETIME_CODES = [
            "QUAYSO01", "QUAYSO02", "QUAYSO03", "VIP999", "LUCKY2026", "GIFT888"
        ];

        const RIGGED_USERS_LIST = [
            { name: "Nguyễn Văn A", targetReward: "iPhone 15 Pro Max" },
            { name: "Trần Thị B",   targetReward: "Tai Nghe Bluetooth" },
            { name: "Lê Hoàng C",   targetReward: "Thẻ Cào 500.000đ" }
        ];

        const RESET_PASSWORD = "admin"; // Mật khẩu để Reset hệ thống dữ liệu

        const GOOGLE_SHEET_URL = "https://google.com";

        // --- LOGIC HỆ THỐNG VẬN HÀNH ---
        const state = {
            rewards: HARDCODED_REWARDS,
            onetimeCodes: [...INITIAL_ONETIME_CODES], 
            history: [], 
            isAuthenticated: false,
            isSpinning: false,
            currentAngle: 0,
            currentUser: { name: "", code: "" },
            forcedReward: "" 
        };

        const colors = ["#ff4757", "#2ed573", "#1e90ff", "#ffa502", "#9370db", "#11bbc0", "#ff6b81", "#3cd371"];
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const btnSpin = document.getElementById("btnSpin");
        const playerNameInput = document.getElementById("playerNameInput");
        const inviteCodeInput = document.getElementById("inviteCodeInput");
        const btnVerifyCode = document.getElementById("btnVerifyCode");
        const authStatus = document.getElementById("authStatus");
        const wheelContainer = document.getElementById("wheelContainer");
        const historyList = document.getElementById("historyList");

window.addEventListener("DOMContentLoaded", () => {
    loadDataFromStorage();
    drawWheel();
    updateHistoryUI();
    setupEventListeners();
});

function loadDataFromStorage() {
    const savedHistory = localStorage.getItem("lucky_history");
    if (savedHistory) state.history = JSON.parse(savedHistory);
    
    const savedCodes = localStorage.getItem("lucky_onetime_codes");
    if (savedCodes) {
        state.onetimeCodes = JSON.parse(savedCodes);
    } else {
        state.onetimeCodes = [...INITIAL_ONETIME_CODES];
        localStorage.setItem("lucky_onetime_codes", JSON.stringify(state.onetimeCodes));
    }
}

function drawWheel() {
    const numSegments = state.rewards.length;
    if (numSegments === 0) return;
    
    const arcSize = (2 * Math.PI) / numSegments;
    const size = canvas.width;
    const center = size / 2;
    const radius = center - 10;
    
    ctx.clearRect(0, 0, size, size);
    
    for (let i = 0; i < numSegments; i++) {
        const angle = state.currentAngle + i * arcSize;
        ctx.fillStyle = colors[i % colors.length];
        
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + arcSize, false);
        ctx.lineTo(center, center);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.stroke();
        
        ctx.save();
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.translate(center, center);
        ctx.rotate(angle + arcSize / 2);
        ctx.fillText(state.rewards[i], radius - 25, 0);
        ctx.restore();
    }
    
    ctx.beginPath();
    ctx.arc(center, center, 40, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#2f3542";
    ctx.stroke();
}

function setupEventListeners() {
    btnVerifyCode.addEventListener("click", () => {
        const name = playerNameInput.value.trim();
        const code = inviteCodeInput.value.trim().toUpperCase();
        
        if (!name || !code) {
            authStatus.textContent = "⚠️ Vui lòng điền đầy đủ cả Họ tên và Mã quay!";
            authStatus.style.color = "#ff4757";
            return;
        }
        
        const isCodeValid = state.onetimeCodes.includes(code);
        
        if (isCodeValid) {
            state.isAuthenticated = true;
            state.currentUser = { name: name, code: code };
            
            const matchedRiggedUser = RIGGED_USERS_LIST.find(user => user.name.toLowerCase() === name.toLowerCase());
            
            if (matchedRiggedUser) {
                state.forcedReward = matchedRiggedUser.targetReward;
                authStatus.textContent = `✅ Xác thực thành công! Hệ thống sẵn sàng cho lượt quay số.`;
            } else {
                state.forcedReward = "";
                authStatus.textContent = `✅ Xác thực thành công! Xin mời bạn tiến hành quay số ngẫu nhiên.`;
            }
            
            authStatus.style.color = "#2ed573";
            wheelContainer.classList.remove("disabled");
            btnSpin.disabled = false;
        } else {
            authStatus.textContent = "❌ Mã quay thưởng không chính xác, hoặc đã được sử dụng trước đó!";
            authStatus.style.color = "#ff4757";
        }
    });
    
    btnSpin.addEventListener("click", spinWheel);
    
    document.getElementById("btnClosePopup").addEventListener("click", () => {
        document.getElementById("popupWin").classList.remove("active");
    });
    
    document.getElementById("btnResetAll").addEventListener("click", () => {
        const inputPassword = prompt("Nhập mật khẩu quản trị để thực hiện Reset hệ thống:");
        if (inputPassword === null) return;
        
        if (inputPassword === RESET_PASSWORD) {
            if (confirm("Mật khẩu chính xác! Hành động này sẽ xóa toàn bộ lịch sử hiển thị và khôi phục lại các mã quay. Bạn chắc chắn chứ?")) {
                localStorage.clear();
                location.reload();
            }
        } else {
            alert("❌ Mật khẩu không chính xác! Quyền xóa lịch sử bị từ chối.");
        }
    });
}

function spinWheel() {
    if (state.isSpinning || state.rewards.length === 0) return;
    
    state.isSpinning = true;
    btnSpin.disabled = true;
    
    let targetReward = state.forcedReward;
    let targetIndex = state.rewards.indexOf(targetReward);
    
    if (targetIndex === -1) {
        targetIndex = Math.floor(Math.random() * state.rewards.length);
    }
    
    const numSegments = state.rewards.length;
    const arcSize = (2 * Math.PI) / numSegments;
    const targetAngleFromBase = targetIndex * arcSize + arcSize / 2;
    const finalAngle = 2 * Math.PI - targetAngleFromBase - (Math.PI / 2);
    
    const extraTurns = 6;
    const totalRotation = extraTurns * 2 * Math.PI + finalAngle;
    const duration = 4500;
    const startTime = performance.now();
    const baseAngle = state.currentAngle % (2 * Math.PI);
    
    function animate(currentTime) {
        const elapsed = currentTime - startTime;
        if (elapsed >= duration) {
            state.currentAngle = baseAngle + totalRotation;
            drawWheel();
            finishSpin(targetIndex);
        } else {
            const progress = elapsed / duration;
            const easeOut = 1 - Math.pow(1 - progress, 3);
            state.currentAngle = baseAngle + totalRotation * easeOut;
            drawWheel();
            requestAnimationFrame(animate);
        }
    }
    requestAnimationFrame(animate);
}

function finishSpin(winnerIndex) {
    state.isSpinning = false;
    const luckyReward = state.rewards[winnerIndex];
    
    document.getElementById("winRewardName").textContent = luckyReward;
    document.getElementById("popupWin").classList.add("active");
    
    if (typeof confetti === "function") {
        confetti({ particleCount: 140, spread: 70, origin: { y: 0.6 } });
    }
    
    const timeStr = new Date().toLocaleString('vi-VN');
    const winData = {
        name: state.currentUser.name,
        code: state.currentUser.code,
        reward: luckyReward,
        time: timeStr
    };
    
    state.history.unshift(winData);
    localStorage.setItem("lucky_history", JSON.stringify(state.history));
    updateHistoryUI();
    
    if (GOOGLE_SHEET_URL) {
        const formBody = new URLSearchParams();
        formBody.append("name", winData.name);
        formBody.append("code", winData.code);
        formBody.append("reward", winData.reward);
        formBody.append("time", winData.time);
        
        fetch(GOOGLE_SHEET_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
            },
            body: formBody
        })
        .then(() => console.log("✅ Đã truyền lệnh đẩy dữ liệu Tên - Mã - Quà về Google Sheet!"))
        .catch(err => console.error("❌ Lỗi mạng kết nối Google Sheet:", err));
    }
    
    const usedCodeIndex = state.onetimeCodes.indexOf(state.currentUser.code);
    if (usedCodeIndex !== -1) {
        state.onetimeCodes.splice(usedCodeIndex, 1);
        localStorage.setItem("lucky_onetime_codes", JSON.stringify(state.onetimeCodes));
        console.log(`🔒 Mã [${state.currentUser.code}] đã được tiêu thụ và bị hủy vĩnh viễn!`);
    }
    
    state.isAuthenticated = false;
    state.forcedReward = "";
    btnSpin.disabled = true;
    wheelContainer.classList.add("disabled");
    playerNameInput.value = "";
    inviteCodeInput.value = "";
    authStatus.textContent = "🔒 Lượt quay đã hoàn tất. Mã quay này đã hết hiệu lực sử dụng!";
    authStatus.style.color = "#ffa502";
}

function updateHistoryUI() {
    if (!historyList) return;
    if (state.history.length === 0) {
        historyList.innerHTML = '<li class="empty-msg" style="text-align: center; color: #747d8c; padding: 15px;">Chưa có ai trúng thưởng.</li>';
        return;
    }
    
    historyList.innerHTML = state.history.map(item => `
        <li style="padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; display: flex; justify-content: space-between;"> 
            <div> 
                <b style="color: #ffa502;">🔑 Mã: ${item.code}</b>  
                <br>🎁 <span style="color: #fff; font-weight: 600;">${item.reward}</span> 
            </div> 
            <span style="color: #747d8c; font-size: 11px; align-self: center;">${item.time.split(" ") || item.time}</span> 
        </li>
    `).join("");
}

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Thư viện tạo hiệu ứng pháo hoa rực rỡ -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="container">
        <!-- Khu vực chính: Nhập thông tin & Vòng quay -->
        <div class="main-section">
            <div class="auth-box" id="authBox">
                <h3>🔑 Nhập Thông Tin Tham Gia</h3>
                <input type="text" id="playerNameInput" placeholder="Nhập tên(2 chữ)...">
                <input type="text" id="inviteCodeInput" placeholder="Nhập mã quay thưởng...">
                <button id="btnVerifyCode">Xác nhận thông tin</button>
                <p class="status-msg" id="authStatus"></p>
            </div>
            
            <div class="wheel-container disabled" id="wheelContainer">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
                <button id="btnSpin" disabled>QUAY</button>
            </div>
        </div>

        <!-- Khu vực bên phải: Lịch sử trúng thưởng công khai -->
        <div class="sidebar-section">
            <div class="card">
                <div class="card-header">
                    <h3>🏆 Lịch Sử Trúng Thưởng</h3>
                    <button id="btnResetAll" class="btn-sm btn-danger">🔄 Reset</button>
                </div>
                <div class="card-body">
                    <ul class="history-list" id="historyList"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup chúc mừng -->
    <div class="popup-overlay" id="popupWin">
        <div class="popup-content">
            <h2>🎉 CHÚC MỪNG BẠN!</h2>
            <p>Bạn đã trúng thưởng phần quà:</p>
            <h1 id="winRewardName">Phần quà</h1>
            <button id="btnClosePopup">Đóng thông báo</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
